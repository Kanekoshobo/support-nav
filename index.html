<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせナビ</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.7;
    }
    h1 {
      border-bottom: 2px solid #ddd;
      padding-bottom: 12px;
    }
    button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
    }
    .answer {
      background: #f7f7f7;
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .form-button {
      display: block;
      background: #222;
      color: #fff;
      text-align: center;
      padding: 14px;
      border-radius: 6px;
      text-decoration: none;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>お問い合わせ案内</h1>
  <p>お問い合わせ内容に近いものを選んでください。</p>

  <div id="app"></div>

  <script>
    const formUrl = "https://docs.google.com/forms/d/e/ここにGoogleフォームURLを入れる/viewform";

const tree = {
  "研究目的で使いたい": {
    "POMS 2をWeb・フォーム・システムで使いたい": "研究目的で、かつLvB登録があり、POMS 2をWeb・フォーム・システム等に転載して使用する場合は、専用申込フォームでの受付を想定しています。有資格者氏名、有資格者番号、対象人数、実施方法、画面案をご準備ください。",
    "POMS 2以外のLvB検査を使いたい": "LvB検査の場合は、まずLvB登録の有無を確認します。登録がある場合は、有資格者氏名・有資格者番号を添えてお問い合わせください。登録がない場合は、先にLvB登録取得をご案内します。",
    "LvB検査以外を使いたい": "研究目的でLvB検査以外の心理検査を使用する場合は、検査名、研究目的、対象人数、実施方法、転載範囲を入力してお問い合わせください。内容確認後にご案内します。",
    "検査名やLvB該当か分からない": "検査名、利用目的、対象人数、実施方法を入力してお問い合わせください。社内で確認のうえ、必要な手続きをご案内します。"
  },

  "臨床目的で使いたい": {
    "Web転載・フォーム化・電子化して使いたい": "臨床目的でのWeb転載・フォーム化・電子化利用については、現在許諾しておりません。正規の検査用紙、オンライン版、検査用具を各商品の利用条件に従ってご利用ください。",
    "正規の検査用紙・オンライン版を購入したい": "購入・見積・登録に関するご相談として承ります。商品名、数量、使用者の資格、所属機関を入力してください。",
    "電子カルテに保存したい": "回答済み用紙や採点シートの電子カルテ保存については、院内記録・情報共有の範囲か、複製に当たるかを確認します。検査名、保存対象、閲覧範囲を入力してください。"
  },

  "教育目的で使いたい": {
    "授業・研修で使用したい": "教育目的での使用は、検査名、使用範囲、対象者、配布・掲載の有無を確認します。詳細を入力してお問い合わせください。",
    "講義資料・スライドに掲載したい": "質問項目、検査用紙、マニュアル内容、表紙画像などを資料に掲載する場合は、転載確認が必要です。掲載範囲と公開範囲を入力してください。",
    "学生の研究指導で使いたい": "学生本人の研究か、指導教員の管理下での使用かを確認します。検査名、研究目的、指導教員情報、対象人数、実施方法を入力してください。"
  },

  "その他の目的で使いたい": {
    "企業研修・社内施策で使いたい": "企業研修、健康経営、社内調査、効果測定での利用は、検査名、対象人数、実施方法、商用性、結果の利用範囲を確認します。",
    "商品紹介・記事・会報誌に掲載したい": "表紙画像、パンフレット、検査内容、紹介文を掲載したい場合は、掲載媒体、公開範囲、締切日を入力してください。",
    "どれに当てはまるか分からない": "検査名、利用目的、対象人数、実施方法、希望する対応をできるだけ具体的に入力してください。社内確認後にご案内します。"
  },

  "購入・見積・請求書・領収書について": {
    "見積書がほしい": "商品名、数量、宛名、送付先、希望納期、見積書に必要な記載事項をお知らせください。",
    "請求書払い・銀行振込にしたい": "公費、学校、医療機関、法人での請求書払い・銀行振込について確認します。商品名または講座名、申込者名、請求書宛名をお知らせください。",
    "領収書・請求書・納品書を再発行したい": "再発行対象、宛名、日付、注文番号、講座名、申込者名、修正したい内容をお知らせください。",
    "注文状況・納期を確認したい": "注文日、注文方法、商品名、注文者名、注文経路をお知らせください。"
  },

  "セミナー・ワークショップについて": {
    "開催予定・次回日程を知りたい": "ADOS-2、ADI-R、CARS2、PARS-TRなどの次回開催予定、モジュール別開催予定はこちらです。",
    "申し込み・キャンセルをしたい": "講座名、開催日、申込者名をお知らせください。キャンセル、重複申込、代理受講などを確認します。",
    "請求書払い・公費払いで受講したい": "講座名、受講者名、所属機関、請求書宛名をお知らせください。",
    "領収書・参加証明書・修了証がほしい": "講座名、開催日、受講者名、必要な書類、記載してほしい内容をお知らせください。",
    "受講後に資格・認定証が得られるか知りたい": "講座により取得できる資格・認定・臨床使用条件は異なります。講座名と目的をお知らせください。"
  },

  "心理検査オンラインの操作・不具合について": {
    "ログインできない": "ID、パスワード、登録メールアドレス、表示されるエラー内容をお知らせください。",
    "新規登録・追加注文の方法を知りたい": "心理検査オンラインの登録、追加注文、見積依頼、購入手順はこちらです。",
    "得点・報告書について知りたい": "T得点、報告書、経過報告書、年齢・性別の扱い、複数回実施結果の紐づけはこちらです。",
    "システムエラーが出る": "発生日時、操作内容、表示されたエラー、画面キャプチャの有無をお知らせください。"
  },

  "RODS 第3版・ソフトウェアについて": {
    "動作環境を確認したい": "Windows、Office、Accessランタイム、32ビット・64ビット、ネット接続の有無などを確認します。",
    "インストール・認証について知りたい": "インストール時のメールアドレス、認証コード、院内ネットワーク環境、外部接続のないPCでの利用について確認します。",
    "新しいPCへ移行したい": "旧PCから新PCへの移行、バックアップ、アンインストール、再インストールの方法を確認します。",
    "複数台で使いたい": "利用予定台数、同時利用の有無、予備PCへのインストール希望をお知らせください。"
  },

  "ADOS-2検査用具・備品について": {
    "スタートセットの購入・見積がほしい": "ADOS-2スタートセットの見積、購入条件、セミナー受講後の購入予定について確認します。",
    "検査用具・備品の不具合を相談したい": "購入時期、購入番号、具体的な不具合のある用具名をお知らせください。",
    "検品結果・不足品を連絡したい": "購入番号、商品名、不足・破損・不具合の内容をお知らせください。"
  },

  "商品内容・得点・マニュアル記載について": {
    "T得点・尺度得点について知りたい": "TEG、POMS、CISSなどのT得点、尺度得点、グラフ、換算表、解釈に関する質問はこちらです。",
    "マニュアルの記載内容を確認したい": "該当する商品名、ページ、表番号、確認したい記載をお知らせください。",
    "サンプル・資料・パンフレットがほしい": "商品内容が分かる資料、パンフレット、サンプルレポートの有無を確認します。",
    "英語版・海外版・Pearson関連について知りたい": "英語版、海外版、Pearson社商品、翻訳版、海外住所への発送などについて確認します。"
  }
};
    const app = document.getElementById("app");

    function showMain() {
      app.innerHTML = "<h2>大項目を選択してください</h2>";
      Object.keys(tree).forEach(category => {
        const button = document.createElement("button");
        button.textContent = category;
        button.onclick = () => showSub(category);
        app.appendChild(button);
      });
    }

    function showSub(category) {
      app.innerHTML = `<h2>${category}</h2><p>詳しい内容を選択してください。</p>`;

      Object.keys(tree[category]).forEach(item => {
        const button = document.createElement("button");
        button.textContent = item;
        button.onclick = () => showAnswer(category, item);
        app.appendChild(button);
      });

      const back = document.createElement("button");
      back.textContent = "← 戻る";
      back.onclick = showMain;
      app.appendChild(back);
    }

    function showAnswer(category, item) {
      const answer = tree[category][item];

      app.innerHTML = `
        <h2>${item}</h2>
        <div class="answer">
          <p>${answer}</p>
        </div>
        <button onclick="showMain()">解決したので最初に戻る</button>
        <a class="form-button" href="${formUrl}" target="_blank">
          解決しないので問い合わせる
        </a>
        <button onclick="showSub('${category}')">← 前の選択肢に戻る</button>
      `;
    }

    showMain();
  </script>
</body>
</html>
