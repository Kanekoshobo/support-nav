<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせナビ</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.7;
    }
    h1 {
      border-bottom: 2px solid #ddd;
      padding-bottom: 12px;
    }
    button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
    }
    .answer {
      background: #f7f7f7;
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .form-button {
      display: block;
      background: #222;
      color: #fff;
      text-align: center;
      padding: 14px;
      border-radius: 6px;
      text-decoration: none;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>お問い合わせ案内</h1>
  <p>お問い合わせ内容に近いものを選んでください。</p>

  <div id="app"></div>

  <script>
    const formUrl = "https://docs.google.com/forms/d/e/ここにGoogleフォームURLを入れる/viewform";

const tree = {
  "研究・論文・調査で使いたい": {
    "卒論・修論・博士論文で使いたい": "検査名、研究目的、対象人数、実施方法、指導教員または研究責任者の情報を確認します。購入済みの正規検査用紙を人数・回数分使用する場合と、質問項目を別媒体に転載して使用する場合で手続きが異なります。",
    "大学・病院・企業の研究で使いたい": "共同研究、臨床試験、企業調査、CRO・調査会社を介した利用では、利用主体、対象人数、実施方法、商用性、契約・NDAの要否を確認します。",
    "論文・学会発表で結果を掲載したい": "得点や分析結果の掲載と、質問項目・用紙画像・尺度内容の掲載は扱いが異なります。質問項目等を掲載する場合は転載確認が必要です。",
    "検査の一部だけ使いたい": "一部項目の抜粋利用、特定因子のみの使用、質問順の入れ替え、他尺度との混在は、検査の標準性や著作権に関わるため個別確認が必要です。",
    "質問項目の文言を変更したい": "検査内容の改変は原則として慎重な確認が必要です。変更したい箇所、理由、研究計画、対象者を明記してお問い合わせください。"
  },

  "Web調査・オンライン問診・電子化して使いたい": {
    "Googleフォーム・Microsoft Formsで実施したい": "質問項目や教示文をフォームへ入力する場合、媒体を問わず転載・デジタル化に該当する可能性があります。検査名、対象人数、使用目的、フォーム画面の確認可否を添えてお問い合わせください。",
    "自社アンケートシステムに組み込みたい": "自社システム、調査会社システム、ePRO、WEBアンケートへの組み込みは、転載許諾、画面確認、利用人数、使用料、契約条件の確認が必要です。",
    "WEB問診・電子カルテで使いたい": "WEB問診や電子カルテへの取り込みは、院内利用・記録保存・複製の範囲を確認します。検査名、保存対象、閲覧者、院外共有の有無をお知らせください。",
    "オンライン版があるか知りたい": "オンライン版対応の心理検査については、まず心理検査オンラインの利用をご検討ください。対象検査、予定人数、実施回数、見積書の要否を確認します。",
    "オンライン版ではなく自社環境で実施したい": "オンライン版がある検査をあえて自社環境で実施したい場合は、その理由、画面仕様、対象人数、利用期間、回答データの管理方法を確認します。"
  },

  "転載・複製・引用・改変について確認したい": {
    "質問項目・検査用紙を転載したい": "質問項目、教示文、検査用紙、採点表、マニュアル内容を他媒体へ掲載・入力・複製する場合は、許諾確認が必要です。",
    "論文・学会・講演資料に掲載したい": "論文、学会発表、講演資料、スライド、報告書に掲載する場合、掲載範囲、公開範囲、商用性、画像掲載の有無を確認します。",
    "書籍表紙・パンフレット・商品画像を使いたい": "表紙画像、パンフレット、商品画像、紹介文の利用は、使用媒体、掲載箇所、公開範囲、開催日・締切日を確認します。",
    "コピー・スキャン・PDF化してよいか知りたい": "正本コピー、スキャン、PDF保存、電子カルテ保存、院内共有などは、目的と範囲により確認が必要です。",
    "質問項目を変更・削除・追加したい": "文言変更、項目削除、項目追加、順序変更は、改変に該当する可能性があります。変更内容と理由を具体的にお知らせください。",
    "無断複製・不適切使用を報告したい": "無断コピー、不適切な共有、検査資材の著作権侵害が疑われる場合は、対象商品、確認した状況、資料の有無を添えてお問い合わせください。"
  },

  "購入・見積・請求書・領収書・納期について": {
    "見積書がほしい": "商品名、数量、宛名、送付先、希望納期、見積書に必要な記載事項をお知らせください。",
    "請求書払い・銀行振込にしたい": "公費、学校、医療機関、法人での請求書払い・銀行振込について確認します。商品名または講座名、申込者名、請求書宛名をお知らせください。",
    "領収書・請求書・納品書を再発行したい": "再発行対象、宛名、日付、注文番号、講座名、申込者名、修正したい内容をお知らせください。",
    "注文状況・納期を確認したい": "注文日、注文方法、商品名、注文者名、FAX・Web・書店経由などの注文経路をお知らせください。",
    "書店・生協・取次経由で注文したい": "商品により取次・書店・生協経由の可否が異なります。商品名、数量、使用者または施設名をお知らせください。",
    "返品・重複注文を相談したい": "誤注文、重複注文、未開封返品などは、注文日、商品名、数量、注文番号、開封状況を確認します。"
  },

  "購入資格・Level B・登録情報について": {
    "購入資格が必要か知りたい": "心理検査には購入資格や管理責任者の確認が必要な商品があります。商品名、使用目的、使用者の資格、所属をお知らせください。",
    "Level B登録について知りたい": "Level B心理検査の登録、申請、登録状況、登録番号の確認はこちらです。",
    "有資格者番号・登録責任者を確認したい": "過去の購入時の登録者、責任者、有資格者番号の確認や変更について承ります。施設名、商品名、現在分かる情報をお知らせください。",
    "医師・看護師・産業カウンセラー・学生でも購入できるか知りたい": "購入可否は商品、使用目的、管理体制、指導者の有無により異なります。資格名、責任者、研究・臨床・教育の別をお知らせください。",
    "登録者・責任者を変更したい": "旧登録者、新登録者、施設名、商品名、変更理由を確認します。"
  },

  "セミナー・ワークショップ・E-learningについて": {
    "開催予定・次回日程を知りたい": "ADOS-2、ADI-R、CARS2、PARS-TRなどの次回開催予定、モジュール別開催予定はこちらです。",
    "申し込み・キャンセルをしたい": "申込済み講座のキャンセル、重複申込、代理受講、受付終了後の受講希望はこちらです。講座名、開催日、申込者名をお知らせください。",
    "請求書払い・公費払いで受講したい": "公費受講、銀行振込、請求書発行をご希望の場合、講座名、受講者名、所属機関、請求書宛名をお知らせください。",
    "領収書・参加証明書・修了証がほしい": "講座名、開催日、受講者名、必要な書類、記載してほしい内容を確認します。",
    "受講後に資格・認定証が得られるか知りたい": "講座により取得できる資格・認定・臨床使用条件は異なります。受講予定の講座名と目的をお知らせください。",
    "E-learningが視聴できない": "ログイン、視聴期限、Vimeo、メールアドレス誤り、修了証、確認テストの不具合はこちらです。",
    "講義内容・評定項目について質問したい": "PARS-TR E-learningなど、講義内容や評定項目に関する質問はこちらです。講座名、該当スライド・項目番号、質問内容をお知らせください。"
  },

  "心理検査オンラインの操作・不具合について": {
    "ログインできない": "ID、パスワード、登録メールアドレス、表示されるエラー内容をお知らせください。",
    "新規登録・追加注文の方法を知りたい": "心理検査オンラインの登録、追加注文、見積依頼、購入手順はこちらです。",
    "得点・報告書について知りたい": "T得点、報告書、経過報告書、年齢・性別の扱い、複数回実施結果の紐づけはこちらです。",
    "システムエラーが出る": "502 Bad Gatewayなどのエラー、画面が進まない、結果が未作成のまま等の場合、発生日時、操作内容、画面キャプチャの有無をお知らせください。",
    "オンライン版の料金・実施回数を知りたい": "1名分の料金、複数回実施、登録料、見積書の要否について確認します。"
  },

  "RODS 第3版・ソフトウェアの動作環境について": {
    "動作環境を確認したい": "Windows、Office、Accessランタイム、32ビット・64ビット、ネット接続の有無などを確認します。",
    "インストール・認証について知りたい": "インストール時のメールアドレス、認証コード、院内ネットワーク環境、外部接続のないPCでの利用について確認します。",
    "新しいPCへ移行したい": "旧PCから新PCへの移行、バックアップ、アンインストール、再インストールの方法を確認します。",
    "複数台で使いたい": "RODS 第3版は使用許諾・追加ライセンスの確認が必要です。利用予定台数、同時利用の有無をお知らせください。",
    "Word・Excel連携や出力機能について知りたい": "プロトコル出力、統計処理、Office連携、Accessランタイムとの組み合わせについて確認します。",
    "データ移行・データ送付が不安": "データバックアップ、移行、メール添付を避けたい場合の送付方法などを確認します。"
  },

  "ADOS-2検査用具・備品について": {
    "スタートセットの購入・見積がほしい": "ADOS-2スタートセットの見積、購入条件、セミナー受講後の購入予定について確認します。",
    "検査用具・備品の不具合を相談したい": "自由遊びのおもちゃ、シャボン玉、電話、その他備品の不具合はこちらです。購入時期、購入番号、具体的な状態をお知らせください。",
    "検品結果・不足品を連絡したい": "検品時の不足、破損、動作不良について、購入番号、商品名、不具合のある用具名をお知らせください。",
    "セミナー受講と購入資格の関係を知りたい": "ADOS-2関連セミナーの受講後に購入できるか、対象モジュール、資格条件を確認します。"
  },

  "商品内容・得点・マニュアルの記載について": {
    "T得点・尺度得点について知りたい": "TEG、POMS、CISSなどのT得点、尺度得点、グラフ、換算表、解釈に関する質問はこちらです。",
    "マニュアルの記載内容を確認したい": "マニュアルのページ、表、付録、訂正箇所、記載の意味について確認します。該当ページ・表番号をお知らせください。",
    "サンプル・資料・パンフレットがほしい": "商品内容が分かる資料、パンフレット、サンプルレポートの有無を確認します。",
    "英語版・海外版・Pearson関連について知りたい": "英語版、海外版、Pearson社商品、翻訳版、海外住所への発送などについて確認します。",
    "診療報酬・臨床使用上の扱いを確認したい": "診療報酬、検査対象年齢、臨床使用上の条件などは、内容に応じて確認します。"
  },

  "その他・どれに当てはまるか分からない": {
    "上記に当てはまらない": "商品名、使用目的、所属、対象人数、希望する対応をできるだけ具体的に記載してお問い合わせください。"
  }
};
    const app = document.getElementById("app");

    function showMain() {
      app.innerHTML = "<h2>大項目を選択してください</h2>";
      Object.keys(tree).forEach(category => {
        const button = document.createElement("button");
        button.textContent = category;
        button.onclick = () => showSub(category);
        app.appendChild(button);
      });
    }

    function showSub(category) {
      app.innerHTML = `<h2>${category}</h2><p>詳しい内容を選択してください。</p>`;

      Object.keys(tree[category]).forEach(item => {
        const button = document.createElement("button");
        button.textContent = item;
        button.onclick = () => showAnswer(category, item);
        app.appendChild(button);
      });

      const back = document.createElement("button");
      back.textContent = "← 戻る";
      back.onclick = showMain;
      app.appendChild(back);
    }

    function showAnswer(category, item) {
      const answer = tree[category][item];

      app.innerHTML = `
        <h2>${item}</h2>
        <div class="answer">
          <p>${answer}</p>
        </div>
        <button onclick="showMain()">解決したので最初に戻る</button>
        <a class="form-button" href="${formUrl}" target="_blank">
          解決しないので問い合わせる
        </a>
        <button onclick="showSub('${category}')">← 前の選択肢に戻る</button>
      `;
    }

    showMain();
  </script>
</body>
</html>
