<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせナビ</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.7;
    }
    h1 {
      border-bottom: 2px solid #ddd;
      padding-bottom: 12px;
    }
    button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
    }
    .answer {
      background: #f7f7f7;
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .form-button {
      display: block;
      background: #222;
      color: #fff;
      text-align: center;
      padding: 14px;
      border-radius: 6px;
      text-decoration: none;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>お問い合わせ案内</h1>
  <p>お問い合わせ内容に近いものを選んでください。</p>

  <div id="app"></div>

  <script>
    const formUrl = "https://docs.google.com/forms/d/e/ここにGoogleフォームURLを入れる/viewform";

const tree = {
  "研究・論文・調査で使いたい": {
    "卒論・修論・博士論文で使いたい": "研究目的で心理検査・尺度を使用したい場合、検査名、研究目的、対象人数、実施方法、指導教員・責任者の資格情報を確認します。使用可否や必要な購入数・手続きは検査により異なります。",
    "学会発表・論文投稿で結果を掲載したい": "検査結果の数値や概要のみの記載か、質問項目・尺度内容・用紙画像を掲載するかで扱いが変わります。質問項目や評価用紙の内容を表・画像・資料に掲載する場合は、転載・複製の確認が必要です。",
    "企業・医療機関・大学の共同研究で使いたい": "企業、CRO、大学、医療機関での研究利用では、利用主体、対象人数、実施方法、商用・非商用、契約・NDAの要否を確認します。詳細確認が必要なためフォームへお進みください。",
    "検査の一部だけ使いたい・項目を変更したい": "検査項目の抜粋、順序変更、文言変更、他尺度との混在、独自質問紙への組み込みは、著作権・標準化・採点解釈に関わるため個別確認が必要です。"
  },

  "Web調査・オンライン問診・電子化して使いたい": {
    "Googleフォーム・Microsoft Forms等で実施したい": "質問項目や教示文をフォームへ転載する場合は、検査ごとに可否や許諾手続きが異なります。検査名、対象人数、使用目的、フォーム画面の確認可否を添えてお問い合わせください。",
    "自社アンケートシステム・ePRO・WEB問診に組み込みたい": "自社システム、調査会社システム、ePRO、WEB問診等への組み込みは、転載許諾・画面確認・利用人数・契約条件の確認が必要です。詳細を確認するためフォームへお進みください。",
    "電子カルテにスキャン・保存したい": "回答済み用紙や採点シートを電子カルテへ取り込む場合、院内記録・情報共有の範囲か、複製・再利用に当たるかを確認します。検査名、保存対象、利用範囲を明記してください。",
    "オンライン版を購入・利用したい": "オンライン版の有無、登録料、1名あたりの利用料、複数回実施、報告書の出力、見積書作成などは検査ごとに異なります。検査名と予定人数を確認します。"
  },

  "購入・見積・請求書・納期について": {
    "見積書がほしい": "見積書をご希望の場合は、商品名、数量、宛名、送付先、必要な記載事項、希望納期を確認します。公費・大学・医療機関での購入もこちらです。",
    "請求書払い・銀行振込にしたい": "公費・法人・学校等で請求書払いや銀行振込をご希望の場合、対応可否を確認します。対象商品、申込済みかどうか、請求書宛名をお知らせください。",
    "領収書・請求書・納品書を再発行したい": "日付、宛名、番号、研修名、申込者名、再発行理由を確認します。すでに発行済みの書類がある場合は、該当情報を添えてお問い合わせください。",
    "納期・注文状況を確認したい": "注文済み商品の到着確認、FAX注文の到着確認、納期確認はこちらです。注文日、商品名、注文者名、注文方法をお知らせください。",
    "書店・生協・取次経由で注文したい": "書店・生協・販売店経由での注文可否は商品により異なります。商品名、数量、使用者・施設名、取次経由希望の有無を確認します。"
  },

  "購入資格・Level B・登録情報について": {
    "購入資格が必要か知りたい": "心理検査には、専門性や管理責任者の情報が必要な商品があります。商品名、使用者の資格、所属、使用目的を確認します。",
    "Level B・有資格者番号・登録状況を確認したい": "Level B登録、有資格者番号、登録責任者、過去の登録状況、登録者変更について確認します。所属名、登録者候補、商品名をお知らせください。",
    "医師・看護師・産業カウンセラー・学生でも購入できるか知りたい": "購入可否は商品・使用目的・管理体制により異なります。資格名、指導者・責任者の有無、研究または臨床利用かを確認します。",
    "登録者・責任者を変更したい": "登録責任者や購入責任者の変更は、現在の登録情報と新しい責任者情報を確認します。施設名、商品名、旧登録者、新登録者をお知らせください。"
  },

  "セミナー・ワークショップ・E-learningについて": {
    "開催予定・次回日程を知りたい": "ADOS-2、ADI-R、CARS2、PARS-TRなどのセミナー・ワークショップ・E-learningの次回開催予定に関する問い合わせはこちらです。",
    "申し込み・キャンセルをしたい": "申し込み済み講座のキャンセル、重複申込、申込者変更、受付終了後の受講希望はこちらです。講座名、開催日、申込者名をお知らせください。",
    "請求書払い・公費払いで受講したい": "公費受講、銀行振込、請求書発行、支払期日の相談はこちらです。講座名、受講者名、所属機関、請求書宛名を確認します。",
    "領収書・参加証明書がほしい": "領収書、参加証明書、受講証明に関する問い合わせはこちらです。講座名、開催日、受講者名、必要な記載事項を確認します。",
    "受講後に資格が取得できるか知りたい": "セミナー受講により臨床使用資格や認定証が得られるかは講座により異なります。講座名と目的を確認します。",
    "E-learningの内容・視聴・確認テストについて質問したい": "視聴期限、メールアドレス誤り、Vimeo視聴、講義内容、確認テスト、評定項目への質問はこちらです。"
  },

  "著作権・転載・複製・引用について": {
    "質問項目・検査用紙を転載したい": "質問項目、検査用紙、教示文、採点表、尺度内容を資料・フォーム・論文・システムに転載する場合は、個別の許諾確認が必要です。",
    "論文・学会発表・講演資料に掲載したい": "論文、学会発表、講演資料、スライド、会報誌等に掲載する場合、掲載範囲、画像の有無、公開範囲、商用性を確認します。",
    "表紙・パンフレット・画像を使いたい": "書籍表紙、パンフレット、商品画像などを講演資料やWebページに掲載したい場合はこちらです。使用媒体、掲載箇所、公開範囲を確認します。",
    "コピー・スキャン・複製の可否を確認したい": "正本コピー、電子カルテ取り込み、院内保存、複製資材の使用などは、利用範囲と目的を確認します。",
    "著作権侵害・無断複製を報告したい": "無断複製、不適切使用、著作権侵害の可能性がある事例の報告はこちらです。状況、対象商品、確認できる資料を添えてください。"
  },

  "心理検査オンラインの操作・不具合について": {
    "ログインできない": "心理検査オンラインのID・パスワードが承認されない、ログインできない場合はこちらです。登録メールアドレス、利用商品、表示されるエラー内容を確認します。",
    "登録・追加注文の方法を知りたい": "心理検査オンラインの新規登録、既登録者の追加注文、見積依頼、購入手順はこちらです。",
    "オンライン版の得点・報告書について知りたい": "T得点、報告書、経過報告書、複数回実施結果の紐づけ、年齢・性別の扱いなどはこちらです。",
    "システムエラー・502 Bad Gatewayが出る": "エラー画面、発生日時、操作内容、ブラウザ、スクリーンショットの有無を確認します。解決しない場合はフォームへお進みください。"
  },

  "RODSなどソフトウェアの動作環境について": {
    "RODSの動作環境を確認したい": "RODS 第3版など、PC環境、Windows、Officeの32ビット／64ビット、ネット接続の有無、インストール条件について確認します。",
    "新しいPCに移行・再インストールしたい": "旧PCから新PCへの移行、アンインストール、1台利用の条件、予備PCへのインストール可否はこちらです。",
    "インストール時の認証・メール確認について知りたい": "インストール時のメールアドレス、認証コード、インターネット接続がないPCでの設定可否を確認します。",
    "ソフトや備品の不具合について相談したい": "ソフトが動作しない、備品が作動しない、検査キットの一部に不具合がある場合はこちらです。商品名、購入時期、不具合内容を確認します。"
  },

  "その他・どれに当てはまるか分からない": {
    "上記に当てはまらない": "内容を確認します。商品名、使用目的、所属、対象人数、希望する対応をできるだけ具体的に記載してお問い合わせください。"
  }
};
    const app = document.getElementById("app");

    function showMain() {
      app.innerHTML = "<h2>大項目を選択してください</h2>";
      Object.keys(tree).forEach(category => {
        const button = document.createElement("button");
        button.textContent = category;
        button.onclick = () => showSub(category);
        app.appendChild(button);
      });
    }

    function showSub(category) {
      app.innerHTML = `<h2>${category}</h2><p>詳しい内容を選択してください。</p>`;

      Object.keys(tree[category]).forEach(item => {
        const button = document.createElement("button");
        button.textContent = item;
        button.onclick = () => showAnswer(category, item);
        app.appendChild(button);
      });

      const back = document.createElement("button");
      back.textContent = "← 戻る";
      back.onclick = showMain;
      app.appendChild(back);
    }

    function showAnswer(category, item) {
      const answer = tree[category][item];

      app.innerHTML = `
        <h2>${item}</h2>
        <div class="answer">
          <p>${answer}</p>
        </div>
        <button onclick="showMain()">解決したので最初に戻る</button>
        <a class="form-button" href="${formUrl}" target="_blank">
          解決しないので問い合わせる
        </a>
        <button onclick="showSub('${category}')">← 前の選択肢に戻る</button>
      `;
    }

    showMain();
  </script>
</body>
</html>
