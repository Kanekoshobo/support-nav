    }

    function showSub(category) {
      app.innerHTML = `<h2>${category}</h2><p>詳しい内容を選択してください。</p>`;

      Object.keys(tree[category]).forEach(item => {
        const button = document.createElement("button");
        button.textContent = item;
        button.onclick = () => showAnswer(category, item);
        app.appendChild(button);
      });

      const back = document.createElement("button");
      back.textContent = "← 戻る";
      back.onclick = showMain;
      app.appendChild(back);
    }

    function showAnswer(category, item) {
      const answer = tree[category][item];

      app.innerHTML = `
        <h2>${item}</h2>
        <div class="answer">
          <p>${answer}</p>
        </div>
        <button onclick="showMain()">解決したので最初に戻る</button>
        <a class="form-button" href="${formUrl}" target="_blank">
          解決しないので問い合わせる
        </a>
        <button onclick="showSub('${category}')">← 前の選択肢に戻る</button>
      `;
    }

    showMain();
  </script>
</body>
</html>
